<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACD - Liste des sites</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500&display=swap");

      body {
        margin: 0;
        display: grid;
        font-family: "K2D", sans-serif;

        grid-template-columns: 8% 92%;
        min-height: 100vh;
        background-color: #0f172a;
        color: white;
      }

    
      header {
        background-color: #1e2533;
        color: #d1d5db;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        height: 100vh;
        box-sizing: border-box;
        border-right: 1px solid #334155;
        position: sticky;
        top: 0;
      }

      .top-nav { width: 100%; text-align: center; }
      .logo h1 { color: white; font-size: 40px; margin-top: 0; margin-bottom: 40px; }
      
      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px 0;
        cursor: pointer;
        transition: 0.2s;
        color: #9ca3af;
      }
      .menu-item.active { color: white; }
      .menu-item p { margin: 0; font-size: 14px; color: inherit; }
      .material-symbols-outlined { font-size: 40px; color: inherit; font-variation-settings: "wght" 300; }

   
      .language-picker {
        background-color: #141827;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 15px;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.1);
      }
      .flag-icon { width: 25px; height: 18px; object-fit: cover; border-radius: 2px; }

 
      main {
        padding: 40px;
        height: 100vh;
        overflow-y: auto;
        box-sizing: border-box;
      }

      main::-webkit-scrollbar { width: 8px; }
      main::-webkit-scrollbar-track { background: #0f172a; }
      main::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }


      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .search-group { display: flex; gap: 15px; }
      .input-pill {
        background-color: #1e2533;
        border-radius: 50px;
        display: flex;
        align-items: center;
        padding: 8px 20px;
        border: 1px solid #334155;
      }
      .input-pill input {
        background: transparent;
        border: none;
        color: white;
        outline: none;
        margin-left: 10px;
        width: 200px;
      }
      .user-avatar {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #6366f1;
      }


      .card-grid {
        display: grid;
        
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
      }

      .card {
        background-color: #1e2533;
        border-radius: 15px;
        overflow: hidden;
        transition: transform 0.2s;
      }
      .card:hover { transform: translateY(-5px); }

      .card-img {
        width: 100%;
        height: 180px;
        background-color: white; 
        object-fit: cover;
      }

      .card-content { padding: 20px; }
      .card-content h3 { margin: 0 0 8px 0; font-size: 18px; }
      .card-content p { 
        font-size: 13px; 
        color: #9ca3af; 
        line-height: 1.4; 
        margin-bottom: 20px;
        height: 55px; 
        overflow: hidden;
      }

      .card-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
      }

      .btn-add { background-color: #6366f1; color: white; }
      .btn-delete { background-color: #ef4444; color: white; }
      .btn-visit { background-color: #334155; color: white; }

      a { text-decoration: none; }
    </style>
  </head>
  <body>
    <header>
      <div class="top-nav">
        <div class="logo"><h1>ACD</h1></div>
        <nav>
          <a href="index.html"><div class="menu-item"><span class="material-symbols-outlined">map</span><p>Explorer</p></div></a>
          <a href="#"><div class="menu-item active"><span class="material-symbols-outlined">list</span><p>Liste des sites</p></div></a>
          <a href="#"><div class="menu-item"><span class="material-symbols-outlined">account_circle</span><p>Mon compte</p></div></a>
          <a href="#"><div class="menu-item"><span class="material-symbols-outlined">list_alt_check</span><p>Sites marqués</p></div></a>
          <a href="#"><div class="menu-item"><span class="material-symbols-outlined">patient_list</span><p>Sites visités</p></div></a>
        </nav>
      </div>

      <div class="language-picker">
        <img src="https://flagcdn.com/w80/fr.png" class="flag-icon">
        <span style="font-size: 18px; color: white;">FR</span>
        <span class="material-symbols-outlined" style="font-size: 20px; color: white;">expand_less</span>
      </div>
    </header>

    <main>
      <div class="top-bar">
        <div class="search-group">
          <div class="input-pill">
            <span class="material-symbols-outlined" style="font-size: 20px;">search</span>
            <input type="text" placeholder="Rechercher un site...">
          </div>
          <div class="input-pill">
            <span class="material-symbols-outlined" style="font-size: 20px;">filter_alt</span>
            <input type="text" placeholder="Filtre: aucun" readonly>
          </div>
        </div>
        <img src="https://i.pravatar.cc/150?img=11" class="user-avatar">
      </div>

      <div class="card-grid" id="main-grid">
        </div>
    </main>

    <script>

      const sites = [
        { id: 1, name: "Nom du site, Placement", added: true },
        { id: 2, name: "Nom du site, Placement", added: false },
        { id: 3, name: "Nom du site, Placement", added: false },
        { id: 4, name: "Nom du site, Placement", added: false },
        { id: 5, name: "Nom du site, Placement", added: false },
        { id: 6, name: "Nom du site, Placement", added: false },
        { id: 7, name: "Nom du site, Placement", added: false },
        { id: 8, name: "Nom du site, Placement", added: false },
      ];

      const grid = document.getElementById('main-grid');

      function renderCards() {
        grid.innerHTML = sites.map(site => `
          <div class="card">
            <div class="card-img"></div>
            <div class="card-content">
              <h3>${site.name}</h3>
              <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
              <div class="card-actions">
                ${site.added 
                  ? `<button class="btn btn-delete"><span class="material-symbols-outlined" style="font-size:18px">delete</span> Supprimer de ma liste</button>`
                  : `<button class="btn btn-add"><span class="material-symbols-outlined" style="font-size:18px">add</span> Ajouter à ma liste</button>`
                }
                <button class="btn btn-visit"><span class="material-symbols-outlined" style="font-size:18px">check</span> Marquer comme visité</button>
              </div>
            </div>
          </div>
        `).join('');
      }

      renderCards();
    </script>
  </body>
</html>
