<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACD Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500&display=swap");

      body {
        margin: 0;
        display: grid;
        font-family: "K2D", sans-serif;
        grid-template-columns: 8% 74% 18%;
        min-height: 100vh;
        overflow: hidden;
        background-color: #0f172a;
      }

      header {
        background-color: #1e2533;
        color: #d1d5db;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        height: 100vh;
        box-sizing: border-box;
        background-image:
          linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
        background-size: 20px 20px;
        border-right: 1px solid #334155;
        position: relative; 
      }

      .top-nav { width: 100%; text-align: center; }
      .logo h1 { color: white; font-size: 40px; margin-top: 0; margin-bottom: 40px; }
      
      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 15px 0;
        cursor: pointer;
        transition: 0.2s;
      }
      .menu-item.active .material-symbols-outlined, .menu-item.active p { color: white; }
      .menu-item p { margin: 0; font-size: 14px; color: #9ca3af; }
      .material-symbols-outlined { font-size: 40px; color: #9ca3af; font-variation-settings: "wght" 300; }

      .lang-container {
        position: relative; 
        margin-bottom: 20px;
      }

      .language-picker {
        background-color: #141827;
        border-radius: 50px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 15px;
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.1);
        transition: background 0.2s;
      }

      .language-picker:hover { background-color: #222937; }

      .lang-popup {
        position: absolute;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background-color: #1e2533;
        border: 1px solid #334155;
        border-radius: 12px;
        width: 140px;
        padding: 10px 0;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s ease;
        z-index: 100;
      }

      .lang-popup.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }

      .lang-option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 15px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .lang-option:hover { background-color: rgba(255,255,255,0.05); }
      .flag-icon { width: 25px; height: 18px; object-fit: cover; border-radius: 2px; }
      .lang-text { color: white; font-size: 18px; }

      /* --- MAIN CONTENT --- */
      main { padding: 20px; background-color: #83d0e4; position: relative; }
      .search-container { display: flex; gap: 12px; }
      .search-pill, .filter-pill { 
        background-color: #222937; border-radius: 50px; 
        display: flex; align-items: center; padding: 10px 20px; 
        color: #9CA3AF; cursor: pointer; user-select: none;
      }
      .filter-pill.active { color: white; position: relative; }
      .filter-pill.active::after { 
        content: ""; position: absolute; bottom: -10px; 
        left: 20%; right: 20%; height: 4px; 
        background-color: #222937; border-radius: 2px; 
      }
      .search-pill input { 
        background: transparent; border: none; color: white; 
        outline: none; margin-left: 10px; font-size: 18px; width: 300px; 
      }

      /* --- ASIDE STYLES --- */
      aside { 
        background-color: #141827; 
        border-left: 1px solid #334155;
        display: flex;
        flex-direction: column;
        height: 100vh;
        color: white;
      }

      #aside-dynamic-content {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      /* --- CUSTOM SCROLLBAR --- */
      #aside-dynamic-content::-webkit-scrollbar {
        width: 6px;
      }
      #aside-dynamic-content::-webkit-scrollbar-track {
        background: #0f172a;
        margin: 10px 0;
        border-radius: 10px;
      }
      #aside-dynamic-content::-webkit-scrollbar-thumb {
        background: #6366f1;
        border-radius: 10px;
      }
      #aside-dynamic-content::-webkit-scrollbar-thumb:hover {
        background: #818cf8;
      }

      /* List View */
      .site-card {
        background-color: #1e2533;
        border-radius: 12px;
        display: flex;
        gap: 12px;
        padding: 12px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: 0.2s;
      }
      .site-card:hover { background-color: #2d3649; }
      .site-card img { width: 80px; height: 60px; border-radius: 8px; object-fit: cover; }
      .card-info h4 { margin: 0; font-size: 16px; font-weight: 500; }
      .card-info p { margin: 4px 0 0; color: #9ca3af; font-size: 14px; }

      /* Detail View */
      .back-btn { 
        display: flex; align-items: center; gap: 8px; color: #9ca3af; 
        cursor: pointer; margin-bottom: 15px; font-size: 14px;
      }
      .detail-img { width: 100%; border-radius: 12px; margin-bottom: 15px; }
      .detail-view h2 { margin: 0; font-size: 22px; }
      .detail-view .region { color: #9ca3af; margin-bottom: 15px; display: block; }
      .detail-view .desc { font-size: 14px; line-height: 1.5; color: #cbd5e1; margin-bottom: 20px; }
      .btn-group { display: flex; flex-direction: column; gap: 10px; }
      .action-btn { 
        width: 100%; padding: 12px; border-radius: 8px; border: none; 
        cursor: pointer; font-family: inherit; font-weight: 500;
      }
      .btn-add { background-color: #6366f1; color: white; }
      .btn-visit { background-color: #334155; color: white; }

      /* Stats Footer */
      .stats-footer {
        padding: 20px;
        border-top: 1px solid #334155;
        background-color: #141827;
      }
      .stats-footer h3 { margin: 0 0 15px 0; font-size: 18px; font-weight: 400; }
      .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-item {
        background-color: #1e2533;
        border-radius: 8px;
        padding: 10px;
        text-align: center;
      }
      .stat-item .num { display: block; font-size: 22px; font-weight: 500; color: #818cf8; }
      .stat-item .label { font-size: 11px; color: #9ca3af; text-transform: capitalize; }

      a { text-decoration: none; }
    </style>
  </head>
  <body>
    <header>
      <div class="top-nav">
        <div class="logo"><h1>ACD</h1></div>
        <nav>
          <a href="#"><div class="menu-item active"><span class="material-symbols-outlined">map</span><p>Explorer</p></div></a>
          <a href="#"><div class="menu-item"><span class="material-symbols-outlined">list</span><p>Liste des sites</p></div></a>
          <a href="#"><div class="menu-item"><span class="material-symbols-outlined">account_circle</span><p>Mon compte</p></div></a>
          <a href="#"><div class="menu-item"><span class="material-symbols-outlined">list_alt_check</span><p>Sites marqués</p></div></a>
          <a href="#"><div class="menu-item"><span class="material-symbols-outlined">patient_list</span><p>Sites visités</p></div></a>
        </nav>
      </div>

      <div class="lang-container">
        <div class="lang-popup" id="langPopup">
          <div class="lang-option" onclick="changeLang('EN', 'us')">
            <img src="https://flagcdn.com/w80/us.png" class="flag-icon"> <span class="lang-text">EN</span>
          </div>
          <div class="lang-option" onclick="changeLang('ES', 'es')">
            <img src="https://flagcdn.com/w80/es.png" class="flag-icon"> <span class="lang-text">ES</span>
          </div>
          <div class="lang-option" onclick="changeLang('FR', 'fr')">
            <img src="https://flagcdn.com/w80/fr.png" class="flag-icon"> <span class="lang-text">FR</span>
          </div>
        </div>

        <div class="language-picker" id="langTrigger">
          <img src="https://flagcdn.com/w80/fr.png" id="mainFlag" class="flag-icon">
          <span class="lang-text" id="mainText">FR</span>
          <span class="material-symbols-outlined" style="font-size: 20px; color: white;">expand_less</span>
        </div>
      </div>
    </header>

    <main>
      <div class="search-container">
        <div class="search-pill">
          <span class="material-symbols-outlined" style="font-size: 24px !important; color: white;">search</span>
          <input type="text" placeholder="Rechercher un site...">
        </div>
        <div class="filter-pill active"><span>Normal</span></div>
        <div class="filter-pill"><span>à visiter</span></div>
        <div class="filter-pill"><span>visités</span></div>
      </div>
    </main>

    <aside>
      <div id="aside-dynamic-content">
        </div>

      <div class="stats-footer">
        <h3>Mes statistiques</h3>
        <div class="stats-row">
          <div class="stat-item">
            <span class="num">13/160</span>
            <span class="label">Site visités</span>
          </div>
          <div class="stat-item">
            <span class="num">7/192</span>
            <span class="label">Pays visités</span>
          </div>
        </div>
      </div>
    </aside>

    <script>
      // LANGUAGE PICKER LOGIC
      const trigger = document.getElementById('langTrigger');
      const popup = document.getElementById('langPopup');
      const mainFlag = document.getElementById('mainFlag');
      const mainText = document.getElementById('mainText');

      trigger.addEventListener('click', (e) => {
        e.stopPropagation();
        popup.classList.toggle('show');
      });

      function changeLang(lang, code) {
        mainText.innerText = lang;
        mainFlag.src = `https://flagcdn.com/w80/${code}.png`;
        popup.classList.remove('show');
      }

      window.addEventListener('click', () => popup.classList.remove('show'));

      // DYNAMIC ASIDE CONTENT LOGIC
      const sitesData = [
        {
          id: 1,
          name: "Arche de Linux, Finlande",
          region: "Europe",
          img: "linux.png",
          desc: "Située au large des côtes accidentées de l'Ostrobotnie, l'Arche de Linux est une formation géologique monumentale unique au monde. Cette structure de granit précambrien s'élève majestueusement au-dessus des eaux glacées du golfe de Botnie."
        },
      
        {
          id: 3,
          name: "Montagne Magique, Chili",
          region: "Amérique du Sud",
          img: "https://i.imgur.com/8Q9Z5OQ.png",
          desc: "Un hôtel incroyable niché dans une forêt profonde, conçu comme un volcan qui crache de l'eau au lieu de lave."
        },
        { id: 4, name: "Site de test 4", region: "Asie", img: "https://i.imgur.com/8Q9Z5OQ.png", desc: "Description test..." },
        { id: 5, name: "Site de test 5", region: "Océanie", img: "https://i.imgur.com/8Q9Z5OQ.png", desc: "Description test..." },
        { id: 6, name: "Site de test 6", region: "Afrique", img: "https://i.imgur.com/8Q9Z5OQ.png", desc: "Description test..." },
        { id: 7, name: "Site de test 7", region: "Europe", img: "https://i.imgur.com/8Q9Z5OQ.png", desc: "Description test..." },
        { id: 8, name: "Site de test 8", region: "Europe", img: "https://i.imgur.com/8Q9Z5OQ.png", desc: "Description test..." }
      ];

      const contentArea = document.getElementById('aside-dynamic-content');

      function renderListView() {
        let html = '';
        sitesData.forEach(site => {
          html += `
            <div class="site-card" onclick="renderDetailView(${site.id})">
              <img src="${site.img}" alt="${site.name}">
              <div class="card-info">
                <h4>${site.name}</h4>
                <p>${site.region}</p>
              </div>
            </div>
          `;
        });
        contentArea.innerHTML = html;
      }

      function renderDetailView(id) {
        const site = sitesData.find(s => s.id === id);
        contentArea.innerHTML = `
          <div class="detail-view">
            <div class="back-btn" onclick="renderListView()">
              <span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> Retour en arrière
            </div>
            <img src="${site.img}" class="detail-img">
            <h2>${site.name}</h2>
            <span class="region">${site.region}</span>
            <p class="desc">${site.desc}</p>
            <div class="btn-group">
              <button class="action-btn btn-add">+ Ajouter à ma liste</button>
              <button class="action-btn btn-visit">✓ Marquer comme visité</button>
            </div>
          </div>
        `;
      }

      // Initial render
      renderListView();

      // Filter Toggle logic
      document.querySelectorAll('.filter-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
        });
      });
    </script>
  </body>
</html>
